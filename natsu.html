<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natsu | Campo de entrenamiento</title>
  <link rel="stylesheet" href="css/natsu.css">
</head>
<body>
  <div class="training-bg" aria-hidden="true"></div>

  <header class="trainer-topbar">
    <a class="back-link" href="index.html">Ghost X Arena</a>
    <div class="trainer-title">
      <span>Natsu</span>
      <strong>Campo de entrenamiento</strong>
    </div>
  </header>

  <main class="trainer-layout">
    <section class="stage-panel">
      <div class="stage-hud">
        <div>
          <span>Estado</span>
          <strong id="stateLabel">Reposo</strong>
        </div>
        <div>
          <span>Direccion</span>
          <strong id="directionLabel">Frente</strong>
        </div>
        <div>
          <span>Energia</span>
          <strong id="energyLabel">100%</strong>
        </div>
      </div>

      <div class="training-stage" id="stage" tabindex="0" aria-label="Campo de entrenamiento de Natsu">
        <div class="arena-lines" aria-hidden="true"></div>
        <div class="flame-orb orb-a" aria-hidden="true"></div>
        <div class="flame-orb orb-b" aria-hidden="true"></div>
        <div class="target target-a" aria-hidden="true"></div>
        <div class="target target-b" aria-hidden="true"></div>
        <div class="natsu-shadow" id="shadow" aria-hidden="true"></div>
        <div class="natsu-sprite" id="natsu" aria-label="Natsu"></div>
      </div>
    </section>

    <aside class="trainer-console">
      <p class="eyebrow">Modulo</p>
      <h1>Natsu Dragneel</h1>

      <div class="desktop-help" aria-label="Controles de teclado para PC">
        <p class="summary">Controles para teclado en PC.</p>
        <div class="key-chips">
          <span>WASD / Flechas</span>
          <span>J Atacar</span>
          <span>F Llama</span>
        </div>
      </div>

      <div class="music-player" aria-label="Reproductor de musica">
        <p class="eyebrow">Musica</p>
        <strong id="trackName">Natsu Theme</strong>
        <div class="track-buttons">
          <button class="track-btn active" type="button" data-track="natsu">Natsu</button>
          <button class="track-btn" type="button" data-track="battle">Batalla</button>
        </div>
        <div class="player-controls">
          <button class="play-btn" id="playPause" type="button">Play</button>
          <label>
            Volumen
            <input id="volumeControl" type="range" min="0" max="1" step="0.05" value="0.65">
          </label>
        </div>
        <small class="audio-status" id="audioStatus">Preparando audio...</small>
        <audio id="musicAudio" preload="auto" autoplay loop playsinline src="assets/audio/natsu-theme.mp3"></audio>
      </div>

    </aside>
  </main>

  <section class="mobile-controls" aria-label="Controles para movil">
    <div class="joystick" aria-label="Joystick de movimiento">
      <button class="joy up" type="button" data-hold="ArrowUp">Arriba</button>
      <button class="joy left" type="button" data-hold="ArrowLeft">Izquierda</button>
      <button class="joy center" type="button" aria-hidden="true" tabindex="-1"></button>
      <button class="joy right" type="button" data-hold="ArrowRight">Derecha</button>
      <button class="joy down" type="button" data-hold="ArrowDown">Abajo</button>
    </div>
    <div class="mobile-actions">
      <button class="mobile-action fire" type="button" data-action="magic">Llama</button>
      <button class="mobile-action" type="button" data-action="attack">Golpe</button>
    </div>
  </section>

  <section class="mobile-player" aria-label="Reproductor movil">
    <button class="play-btn" id="mobilePlayPause" type="button">Play</button>
    <button class="track-btn active" type="button" data-track="natsu">Natsu</button>
    <button class="track-btn" type="button" data-track="battle">Batalla</button>
  </section>

  <script src="vendor/gsap.min.js"></script>
  <script src="js/natsu.js"></script>
</body>
</html>
